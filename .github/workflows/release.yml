# Release workflow.
#
# Triggered when a semver-style tag (e.g. v0.2.0) is pushed. Runs the test
# suite first, then invokes GoReleaser to cross-compile binaries, build
# .deb / .pkg.tar.zst Linux packages, generate a Homebrew formula artifact,
# and publish everything as a GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (snapshot, do not publish)"
        type: boolean
        default: true

permissions:
  contents: write   # required to create the GitHub Release
  packages: write   # in case future steps publish to ghcr.io
  id-token: write   # for keyless signing if added later

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bubblewrap (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # Ubuntu 24.04 AppArmor restricts unprivileged user namespaces.
          # Grant bwrap the userns permission so it can create sandboxes.
          # Without this, every internal/sandboxrun integration test that
          # launches a real bwrap sandbox fails via requireBwrap in CI,
          # blocking the release before GoReleaser ever runs.
          sudo tee /etc/apparmor.d/bwrap > /dev/null <<'EOF'
          abi <abi/4.0>,
          /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          EOF
          sudo apparmor_parser -r /etc/apparmor.d/bwrap

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -count=1 -timeout=10m ./...

  goreleaser:
    name: GoReleaser
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full git history & tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            release --clean
            ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--snapshot --skip=publish' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with Contents: read & write on TNG-release/homebrew-tap.
          # Required so GoReleaser can push the updated formula to the
          # tap repo on every non-prerelease tag. The default GITHUB_TOKEN
          # only has scope on the workflow's own repo, so it cannot be
          # used here.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Upload artifacts (snapshot only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
